name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: x86_64-windows
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: x86_64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            name: x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            name: aarch64-macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: sub-rs

      - name: Rename binary
        shell: bash
        run: |
          cd sub-rs/target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv sub-rs.exe sub-rs-${{ matrix.name }}.exe
          else
            mv sub-rs sub-rs-${{ matrix.name }}
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: sub-rs/target/${{ matrix.target }}/release/sub-rs-${{ matrix.name }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          generate_release_notes: true
